name: Django and Selenium Tests

on:
  pull_request:
    branches:
      - master
      - trabalho-csi410
  push:
    branches:
      - master
      - trabalho-csi410

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.acceptance.yml config

      - name: Run Django and Selenium tests
        run: |
          docker compose -f docker-compose.acceptance.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from web

      - name: Stop test containers
        if: always()
        run: |
          docker compose -f docker-compose.acceptance.yml down \
            --volumes \
            --remove-orphans
